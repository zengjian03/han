<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>玩偶聚合 WebHome</title><style>:root{--text:#f7fbff;--muted:rgba(247,251,255,.68);--line:rgba(255,255,255,.16);--soft:rgba(42,50,58,.44);--accent:#ff6b35;--accent2:#ffb86b;--green:#42e88a;--radius:18px}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:transparent;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",Arial,sans-serif}html:not(.fm-native),html:not(.fm-native) body{background:#222a32}.app{min-height:100vh;padding:10px}.bar{display:flex;align-items:center;gap:8px}.brand{font-size:21px;font-weight:900;white-space:nowrap}.brand b{color:var(--accent2)}.search{flex:1;display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 7px 6px 13px}.search input{flex:1;min-width:0;background:transparent;border:0;outline:0;color:var(--text);font-size:15px}.search button,.btn{border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:999px;padding:8px 12px;font-size:14px}.search button,.primary{border-color:rgba(255,107,53,.45);background:linear-gradient(135deg,rgba(255,107,53,.9),rgba(255,184,107,.72));color:#17110d;font-weight:800}.tabs,.chips{display:flex;gap:8px;overflow:auto;padding:10px 2px 0;scrollbar-width:none}.tab,.chip{white-space:nowrap;border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--muted);font-weight:700}.tab.active,.chip.active{background:rgba(66,232,138,.13);border-color:rgba(66,232,138,.62);color:var(--green);font-weight:900}.status{margin:10px 2px;color:var(--muted);font-size:14px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.card{border-radius:15px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.12)}.poster{aspect-ratio:3/4;background:rgba(255,255,255,.08);position:relative}.poster img{width:100%;height:100%;object-fit:cover}.noimg{height:100%;display:grid;place-items:center;color:var(--muted);font-size:28px}.badge{position:absolute;right:7px;top:7px;padding:3px 8px;border-radius:999px;background:rgba(0,0,0,.58);font-size:11px;font-weight:800}.meta{padding:8px}.name{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.remark{margin-top:4px;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pager{display:flex;gap:8px;justify-content:center;margin:14px 0}.pager button{padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--text)}.sheet{position:fixed;inset:0;z-index:40;display:none;background:transparent;overflow:auto;padding:12px}.sheet.active{display:block}.panel{background:linear-gradient(135deg,rgba(64,35,30,.72),rgba(30,24,24,.58));border:1px solid rgba(255,255,255,.10);border-radius:22px;padding:16px 12px 24px;margin-bottom:42px}.head{display:grid;grid-template-columns:38% 1fr;gap:14px}.pic{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:16px;background:rgba(255,255,255,.08)}.title{font-size:22px;font-weight:700;line-height:1.25}.info{font-size:14px;line-height:1.65;color:rgba(255,255,255,.75);max-height:230px;overflow:hidden}.pill{display:inline-block;margin:18px 0 10px;padding:8px 18px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(255,184,107,.55);font-size:15px;font-weight:800}.desc{font-size:15px;line-height:1.75;color:rgba(255,255,255,.72)}.pan-list{display:grid;gap:9px}.pan-item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:11px;border-radius:14px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14)}.pan-type{padding:4px 9px;border-radius:999px;background:rgba(255,184,107,.18);color:var(--accent2);font-size:12px;font-weight:900}.pan-name{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pan-url{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.empty{padding:34px 18px;text-align:center;color:var(--muted);background:var(--soft);border:1px dashed var(--line);border-radius:var(--radius)}@media(min-width:720px){.grid{grid-template-columns:repeat(5,minmax(0,1fr))}.app{padding:18px 28px}.head{grid-template-columns:180px 1fr}.pic{width:180px}}@media(min-width:1100px){.grid{grid-template-columns:repeat(7,minmax(0,1fr))}.app{max-width:1380px;margin:0 auto}.sheet{max-width:1180px;margin:0 auto}}</style></head><body><div class="app"><div class="bar"><div class="brand">玩偶<b>聚合</b></div><form class="search" id="searchForm"><input id="kw" placeholder="聚合搜索网盘影视…"><button>搜索</button></form><button class="btn" id="aggBtn">聚合</button></div><div class="tabs" id="tabs"></div><div class="chips" id="chips"></div><div class="status" id="status">准备加载…</div><main id="content"></main></div><div class="sheet" id="sheet"><div class="panel" id="panel"></div></div><script>(function(){'use strict';if(window.fongmiBridge||window.fm)document.documentElement.classList.add('fm-native');const SITES=[{id:'wanou',name:'玩偶',domains:['https://wogg.xxooo.cf','https://www.wogg.net'],listSelector:'.module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',categoryUrl:'/vodshow/{categoryId}--------{page}---.html',searchUrl:'/vodsearch/-------------.html?wd={keyword}&page={page}',cats:[['44','臻彩'],['1','电影'],['2','电视剧'],['3','动漫'],['4','综艺'],['5','音乐'],['6','短剧'],['46','纪录片']]},{id:'muou',name:'木偶',domains:['https://www.muou.site','https://www.muou.asia','https://666.666291.xyz'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['25','臻选'],['1','电影'],['2','电视剧'],['3','动漫'],['4','纪录片'],['29','综艺'],['30','原盘']]},{id:'labi',name:'蜡笔',domains:['http://xiaocgege.shop'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['29','臻彩'],['1','电影'],['2','电视剧'],['3','动漫'],['4','综艺'],['5','短剧'],['24','蜡笔4K']]},{id:'zhizhen',name:'至臻',domains:['https://www.mihdr.top','https://mihdr.top'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['26','臻彩'],['1','电影'],['2','电视剧'],['3','动漫'],['4','综艺'],['5','短剧'],['24','老剧']]},{id:'erxiao',name:'二小',domains:['https://www.2xiaopan.top'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['4','臻彩'],['1','电影'],['2','电视剧'],['3','动漫'],['21','综艺']]},{id:'huban',name:'虎斑',domains:['http://38.76.197.172:16969','http://103.45.162.207:20720','http://xhban.xyz:20720'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['6','臻彩'],['1','电影'],['2','电视剧'],['3','综艺'],['4','动漫'],['5','短剧'],['30','115网盘']]},{id:'kuaiying',name:'快映',domains:['http://103.45.162.207:12512','http://38.76.197.172:12521'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['5','臻彩'],['1','电影'],['2','电视剧'],['3','综艺'],['4','动漫'],['6','短剧'],['30','115'],['35','123'],['36','天移迅']]},{id:'shandian',name:'闪电',domains:['http://shandian.blog','http://sd.sduc.site'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['1','电影'],['2','电视剧'],['3','综艺'],['4','动漫'],['30','短剧']]},{id:'ouge',name:'欧哥',domains:['https://woog.nxog.eu.org'],listSelector:'#main .module-item',searchListSelector:'.module-search-item',detailPanSelector:'.module-row-info p',cats:[['1','电影'],['2','电视剧'],['3','动漫'],['4','综艺'],['5','短剧'],['21','综合']]}];let activeSite='wanou',activeCat='',page=1,aggregate=true,last=[];const $=s=>document.querySelector(s),tabs=$('#tabs'),chips=$('#chips'),content=$('#content'),status=$('#status');function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'"'}[c]))}function clean(s){return String(s||'').replace(/\s+/g,' ').trim()}function site(){return SITES.find(x=>x.id===activeSite)||SITES[0]}function abs(base,u){try{return new URL(u,base+'/').href}catch(e){return u||''}}async function req(url){status.textContent='请求：'+url;if(window.fm&&fm.req){let r=await fm.req(url,{method:'GET',headers:{'User-Agent':'Mozilla/5.0','Referer':url},responseType:'text',timeout:16});if(!r.ok)throw new Error(r.error||('HTTP '+r.status));return r.body||''}let r=await fetch(url,{headers:{'User-Agent':'Mozilla/5.0'}});return await r.text()}async function get(site,path){let lastErr='';for(let d of site.domains){let u=path.startsWith('http')?path:d.replace(/\/+$/,'')+path;try{let h=await req(u);if(h&&!/just a moment|cf-browser|access denied/i.test(h))return{html:h,base:d.replace(/\/+$/,'')}}catch(e){lastErr=e.message}}throw new Error(lastErr||'全部域名失败')}function doc(h){return new DOMParser().parseFromString(h,'text/html')}function imgUrl(u){if(!u)return'';u=u.replace(/^\/\//,'https://');let m=u.match(/^https?:\/\/image\.baidu\.com\/search\/down\?url=([^&]+)/i);return m?decodeURIComponent(m[1]):u}function cardFrom(el,base,site){let a=el.querySelector('a[href]')||el.closest('a[href]')||el,href=a.getAttribute('href')||'',img=el.querySelector('img'),title=a.getAttribute('title')||img&&img.getAttribute('alt')||clean(el.querySelector('.module-item-title,.module-search-item-title,.video-title,.title')?.textContent)||clean(a.textContent),pic=imgUrl(img&&(img.getAttribute('data-src')||img.getAttribute('data-original')||img.getAttribute('src'))||''),remark=clean(el.querySelector('.module-item-note,.module-search-item-note,.video-info,.note')?.textContent)||site.name;return{title:title.replace(/\s+/g,' ').slice(0,60),href:abs(base,href),pic:abs(base,pic),remark,siteId:site.id,siteName:site.name}}function renderTabs(){tabs.innerHTML=SITES.map(s=>`<button class="tab ${activeSite===s.id?'active':''}" data-id="${s.id}">${s.name}</button>`).join('');tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeSite=b.dataset.id;activeCat=site().cats[0][0];page=1;renderTabs();renderChips();loadCategory()})}function renderChips(){let s=site();if(!activeCat&&s.cats[0])activeCat=s.cats[0][0];chips.innerHTML=s.cats.map(c=>`<button class="chip ${activeCat===c[0]?'active':''}" data-id="${c[0]}">${c[1]}</button>`).join('');chips.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{activeCat=b.dataset.id;page=1;renderChips();loadCategory()})}function card(v,i){return`<article class="card" data-i="${i}"><div class="poster">${v.pic?`<img loading="lazy" referrerpolicy="no-referrer" src="${esc(v.pic)}">`:'<div class="noimg">偶</div>'}<span class="badge">${esc(v.siteName)}</span></div><div class="meta"><div class="name">${esc(v.title)}</div><div class="remark">${esc(v.remark)}</div></div></article>`}function renderGrid(list,pager){last=list;content.innerHTML=list.length?`<div class="grid">${list.map(card).join('')}</div>${pager?`<div class="pager"><button id="prev" ${page<=1?'disabled':''}>上一页</button><button id="next">下一页</button></div>`:''}`:'<div class="empty">暂无内容</div>';content.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(list[parseInt(c.dataset.i)]));let p=$('#prev'),n=$('#next');if(p)p.onclick=()=>{if(page>1){page--;loadCategory()}};if(n)n.onclick=()=>{page++;loadCategory()}}function catUrl(s,c,p){if(s.categoryUrl)return s.categoryUrl.replace('{categoryId}',c).replace('{page}',p);return `/index.php/vod/show/id/${c}/page/${p}.html`}async function loadCategory(){content.innerHTML='<div class="empty">加载中…</div>';let s=site();try{let r=await get(s,catUrl(s,activeCat,page)),d=doc(r.html),els=[...d.querySelectorAll(s.listSelector||'.module-item')],list=els.map(e=>cardFrom(e,r.base,s)).filter(x=>x.href&&x.title).slice(0,60);renderGrid(list,true);status.textContent=`${s.name} · 第 ${page} 页 · ${list.length} 条`}catch(e){content.innerHTML='<div class="empty">分类失败：'+esc(e.message)+'</div>'}}async function searchSite(s,q){let path=s.searchUrl?s.searchUrl.replace('{keyword}',encodeURIComponent(q)).replace('{page}',1):`/index.php/vod/search/page/1/wd/${encodeURIComponent(q)}.html`;let r=await get(s,path),d=doc(r.html),els=[...d.querySelectorAll(s.searchListSelector||'.module-search-item')];let list=els.map(e=>cardFrom(e,r.base,s)).filter(x=>x.href&&x.title).slice(0,20);return list}function normName(t){return clean(t).replace(/[《》\[\]【】\s·.\-_:：]/g,'').replace(/第[一二三四五六七八九十\d]+季|Season\s*\d+/ig,'').toLowerCase()}async function search(q){content.innerHTML='<div class="empty">聚合搜索中…</div>';let arr=[];if(aggregate){let rs=await Promise.allSettled(SITES.map(s=>searchSite(s,q)));rs.forEach(r=>{if(r.status==='fulfilled')arr=arr.concat(r.value)});let map=new Map();arr.forEach(x=>{let k=normName(x.title);if(!map.has(k))map.set(k,Object.assign({},x,{sources:[x]}));else map.get(k).sources.push(x)});arr=[...map.values()]}else arr=await searchSite(site(),q);renderGrid(arr,false);status.textContent=`搜索：${q} · ${arr.length} 条`}function panType(u){u=String(u||'').toLowerCase();if(u.includes('pan.baidu'))return'百度';if(u.includes('quark'))return'夸克';if(u.includes('aliyun')||u.includes('alipan'))return'阿里';if(u.includes('xunlei'))return'迅雷';if(u.includes('115.com'))return'115';if(u.includes('123'))return'123';if(u.includes('cloud.189'))return'天翼';if(u.includes('caiyun')||u.includes('139'))return'移动';return'网盘'}async function parseDetail(v){let sources=v.sources||[v],all=[];let main=null;for(let src of sources.slice(0,5)){let s=SITES.find(x=>x.id===src.siteId)||site();try{let r=await get(s,src.href),d=doc(r.html);if(!main){let title=clean(d.querySelector('h1,.title,.module-info-heading h1')?.textContent)||src.title,pic=imgUrl(d.querySelector('.module-info-poster img,.detail-pic img,img')?.getAttribute('src')||src.pic),desc=clean(d.querySelector('.module-info-introduction,.desc,.module-info-content')?.textContent)||'';main={title,pic:abs(r.base,pic),desc,siteName:src.siteName}}let txtEls=[...d.querySelectorAll(s.detailPanSelector||'.module-row-info p')];txtEls.forEach(p=>{let t=clean(p.textContent);if(/^https?:/.test(t))all.push({name:src.siteName+' · '+panType(t),url:t,type:panType(t),siteName:src.siteName})});[...d.querySelectorAll('a[href]')].forEach(a=>{let u=a.getAttribute('href')||'';if(/pan\.baidu|quark|aliyun|alipan|xunlei|115\.com|123|cloud\.189|caiyun|magnet:/i.test(u))all.push({name:src.siteName+' · '+(clean(a.textContent)||panType(u)),url:abs(r.base,u),type:panType(u),siteName:src.siteName})})}catch(e){}}let seen=new Set();all=all.filter(x=>x.url&&!seen.has(x.url)&&(seen.add(x.url)||true));return{info:main||v,pans:all}}async function openDetail(v){$('#sheet').classList.add('active');$('#panel').innerHTML='<div class="empty">读取详情…</div>';try{let d=await parseDetail(v),info=d.info;$('#panel').innerHTML=`<button class="btn" id="closeBtn">返回</button><div class="head"><img class="pic" referrerpolicy="no-referrer" src="${esc(info.pic||v.pic||'')}" onerror="this.style.display='none'"><div><div class="title">${esc(info.title||v.title)}</div><div class="info"><div><b>来源：</b>${esc((v.sources||[v]).map(x=>x.siteName).join(' / '))}</div><div><b>资源：</b>${d.pans.length} 条</div></div></div></div><div class="pill">简介</div><div class="desc">${esc(info.desc||v.remark||'暂无简介')}</div><div class="pill">网盘资源</div><div class="pan-list">${d.pans.map((p,i)=>`<div class="pan-item"><span class="pan-type">${esc(p.type)}</span><div><div class="pan-name">${esc(p.name)}</div><div class="pan-url">${esc(p.url)}</div></div><button class="btn" data-i="${i}">打开</button></div>`).join('')||'<div class="empty">未提取到网盘链接</div>'}</div>`;$('#closeBtn').onclick=closeDetail;$('#panel').querySelectorAll('button[data-i]').forEach(b=>b.onclick=()=>playPan(d.pans[parseInt(b.dataset.i)]))}catch(e){$('#panel').innerHTML='<button class="btn" onclick="window.__woClose()">返回</button><div class="empty">详情失败：'+esc(e.message)+'</div>'}}async function playPan(p){let u=p.url;if(window.fm&&fm.play){await fm.play(u.startsWith('magnet:')?u:'push://'+u,p.name);return}location.href=u}function closeDetail(){$('#sheet').classList.remove('active')}searchForm.onsubmit=e=>{e.preventDefault();let q=kw.value.trim();q?search(q):loadCategory()};aggBtn.onclick=()=>{aggregate=!aggregate;aggBtn.textContent=aggregate?'聚合':'单站'};window.__woClose=closeDetail;activeCat=site().cats[0][0];renderTabs();renderChips();loadCategory();})();</script></body></html>
