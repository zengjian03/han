<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebHTV 多仓切换器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #2a2a2a;
            padding: 24px;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: #e67e22;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input {
            background: #3a3a3a;
            color: #fff;
        }
        button {
            background: #e67e22;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #d35400;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            background: #333;
            border-radius: 6px;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
<div class="container">
    <h1>📺 多仓切换器</h1>
    <input type="text" id="configUrl" placeholder="多仓配置URL" value="https://example.com/multi.json">
    <input type="text" id="configName" placeholder="配置显示名称" value="新配置">
    <button id="switchBtn">立即切换</button>
    <div id="status" class="status">等待操作...</div>
</div>

<script>
    // 获取App本地HTTP服务的端口
    async function getLocalPort() {
        // 方法1: 尝试从document.domain获取 (若WebHome在App内加载)
        // 方法2: 尝试扫描常用端口 (9978-9998)
        // 简化起见，先尝试9978，实际可增加重试逻辑
        return 9978;
    }

    // 调用切换API
    async function switchConfig(configUrl, configName) {
        const port = await getLocalPort();
        const apiUrl = `http://127.0.0.1:${port}/action?do=setting&text=${encodeURIComponent(configUrl)}&name=${encodeURIComponent(configName)}`;
        
        try {
            const response = await fetch(apiUrl, { method: 'GET' });
            if (response.ok) {
                showStatus(`✅ 成功切换至“${configName}”`, 'success');
            } else {
                showStatus(`❌ 切换失败，HTTP状态码: ${response.status}`, 'error');
            }
        } catch (error) {
            showStatus(`❌ 请求失败: ${error.message}`, 'error');
        }
    }

    function showStatus(msg, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = msg;
        statusDiv.className = 'status ' + type;
        setTimeout(() => {
            if (statusDiv.className === 'status ' + type) {
                statusDiv.textContent = '等待操作...';
                statusDiv.className = 'status';
            }
        }, 3000);
    }

    document.getElementById('switchBtn').addEventListener('click', () => {
        const configUrl = document.getElementById('configUrl').value.trim();
        const configName = document.getElementById('configName').value.trim();
        if (!configUrl) {
            showStatus('❌ 请填写配置URL', 'error');
            return;
        }
        switchConfig(configUrl, configName);
    });

    // 支持通过URL参数自动切换 (例如: ?url=https://example.com/config.json&name=配置名)
    (function autoSwitchFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');
        const name = params.get('name') || '远程配置';
        if (url) {
            document.getElementById('configUrl').value = url;
            document.getElementById('configName').value = name;
            switchConfig(url, name);
        }
    })();
</script>
</body>
</html>
