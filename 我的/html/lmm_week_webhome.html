<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>路漫漫 WebHome</title>
<style>
:root{--text:#f7fbff;--muted:rgba(247,251,255,.68);--line:rgba(255,255,255,.16);--soft:rgba(42,50,58,.44);--panel:rgba(42,50,58,.62);--accent:#0081cc;--accent2:#4da8e6;--radius:18px}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:transparent;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}html:not(.fm-native),html:not(.fm-native) body{background:#222a32}.app{min-height:100vh;padding:10px 10px 34px}.bar{display:flex;align-items:center;gap:8px}.brand{font-size:21px;font-weight:900;white-space:nowrap}.brand b{color:var(--accent2)}.search{flex:1;display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 7px 6px 13px}.search input{flex:1;min-width:0;background:transparent;border:0;outline:0;color:var(--text);font-size:15px}.search button,.btn{border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:999px;padding:8px 12px;font-size:14px;cursor:pointer}.search button,.primary{border-color:rgba(0,129,204,.45);background:linear-gradient(135deg,rgba(0,129,204,.9),rgba(77,168,230,.72));color:#fff;font-weight:800}.tabs,.chips{display:flex;gap:8px;overflow:auto;padding:10px 2px 0;scrollbar-width:none}.tabs::-webkit-scrollbar,.chips::-webkit-scrollbar{display:none}.tab,.chip{white-space:nowrap;border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--muted)}.tab.active,.chip.active{background:linear-gradient(135deg,rgba(0,129,204,.55),rgba(77,168,230,.3));color:var(--text);border-color:rgba(77,168,230,.58);font-weight:800}.status{margin:10px 2px;color:var(--muted);font-size:14px}.section{margin:16px 0}.section-title{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px}.section-title h2{margin:0;font-size:17px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.card{border-radius:15px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.12);cursor:pointer}.poster{aspect-ratio:3/4;background:rgba(255,255,255,.08);position:relative}.poster img{width:100%;height:100%;object-fit:cover;display:block}.poster .noimg{height:100%;display:grid;place-items:center;color:var(--muted);font-size:28px}.badge{position:absolute;right:7px;top:7px;padding:3px 8px;border-radius:999px;background:rgba(0,0,0,.58);font-size:11px;font-weight:800}.meta{padding:8px 8px 10px}.name{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.remark{margin-top:4px;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sheet{position:fixed;inset:0;z-index:40;display:none;background:transparent;overflow:auto;padding:12px}.sheet.active{display:block}.panel{background:linear-gradient(135deg,rgba(64,35,30,.72),rgba(30,24,24,.58));border:1px solid rgba(255,255,255,.10);border-radius:22px;padding:16px 12px 24px;margin-bottom:42px}.head{display:grid;grid-template-columns:38% 1fr;gap:14px}.pic{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:16px;background:rgba(255,255,255,.08)}.title{font-size:22px;font-weight:700;line-height:1.25;margin:0 0 8px}.info{font-size:14px;line-height:1.65;color:rgba(255,255,255,.75);max-height:210px;overflow:hidden}.pill{display:inline-block;margin:18px 0 10px;padding:8px 18px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(77,168,230,.55);font-size:15px;font-weight:800}.desc{font-size:15px;line-height:1.75;color:rgba(255,255,255,.72)}.line-tabs{display:flex;gap:8px;overflow:auto;margin:8px 0 10px}.line-tab{white-space:nowrap;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.82)}.line-tab.active{background:rgba(0,129,204,.36);border-color:rgba(77,168,230,.55);font-weight:800}.eps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px}.ep{border-radius:12px;padding:10px 5px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.9);font-size:13px;text-align:center;min-height:42px}.empty{padding:34px 18px;text-align:center;color:var(--muted);background:var(--soft);border:1px dashed var(--line);border-radius:var(--radius)}.pager{display:flex;gap:8px;justify-content:center;margin:14px 0}.pager button{padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--text)}@media(min-width:720px){.grid{grid-template-columns:repeat(5,minmax(0,1fr))}.app{padding:18px 28px 44px}.head{grid-template-columns:180px 1fr}.pic{width:180px}.eps{grid-template-columns:repeat(6,minmax(0,1fr))}}@media(min-width:1100px){.grid{grid-template-columns:repeat(7,minmax(0,1fr))}.app{max-width:1380px;margin:0 auto}.sheet{max-width:1180px;margin:0 auto}}
</style>
</head>
<body>
<div class="app"><div class="bar"><div class="brand">路漫漫<b>动漫</b></div><form class="search" id="searchForm"><input id="kw" placeholder="搜索动漫…"><button>搜索</button></form></div><div class="tabs" id="tabs"></div><div class="chips" id="chips"></div><div class="status" id="status">准备加载…</div><main id="content"></main></div>
<div class="sheet" id="sheet"><div class="panel" id="panel"></div></div>
<script>
(function(){
'use strict';
if(window.fongmiBridge||window.fm)document.documentElement.classList.add('fm-native');
const UA='Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36 Chrome/120 Mobile Safari/537.36';
const HOSTS=['https://www.lmm85.com','https://dm.g916.com'];
let HOST=localStorage.getItem('lmm_host')||HOSTS[0];
const NAV=[['home','主页'],['cate','分类'],['week','周表']];
const CATS=[['ribendongman','日本'],['guochandongman','国产'],['oumeidongman','欧美'],['dianying','电影'],['guochandonghuadianying','国产电影'],['ribendonghuadianying','日本电影'],['oumeidonghuadianying','欧美电影']];
const SORTS=[['time','更新'],['up','点赞'],['score','评分'],['hits','人气']];
const WEEKS=[['1','周一'],['2','周二'],['3','周三'],['4','周四'],['5','周五'],['6','周六'],['7','周日']];
let state={nav:'home',cat:'ribendongman',sort:'time',week:String(new Date().getDay()||7),page:1,last:[]},currentDetail=null;
const $=s=>document.querySelector(s),content=$('#content'),status=$('#status'),tabs=$('#tabs'),chips=$('#chips');
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'"'}[c]))}
function clean(s){return String(s||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim()}
function abs(u){try{return new URL(u,HOST+'/').href}catch(e){return u||''}}
function fixImg(u){u=String(u||'');if(u.startsWith('//'))u='https:'+u;if(u.startsWith('http://'))u='https://'+u.slice(7);return u}
async function req(url,opt){url=abs(url);status.textContent='加载：'+url;let h={'User-Agent':UA,'Referer':HOST+'/'};if(window.fm&&fm.req){let r=await fm.req(url,{method:opt&&opt.method||'GET',headers:Object.assign(h,opt&&opt.headers||{}),body:opt&&opt.body,responseType:'text',timeout:opt&&opt.timeout||25});if(!r.ok)throw new Error(r.error||('HTTP '+r.status));return r.body||''}let r=await fetch(url,{method:opt&&opt.method||'GET',headers:Object.assign(h,opt&&opt.headers||{}),body:opt&&opt.body});return await r.text()}
async function safeReq(path){let lastErr=null;for(let host of [HOST].concat(HOSTS.filter(x=>x!==HOST))){try{let old=HOST;HOST=host;let html=await req(host+path);if(/video-img-box|module-player-list|page-title|label/.test(html)&&!/Cloudflare|安全验证|系统提示/.test(html)){localStorage.setItem('lmm_host',host);return html}HOST=old}catch(e){lastErr=e}}throw lastErr||new Error('所有域名均不可用')}
function toVod(x){return{vod_id:String(x.id||x.aid||''),vod_name:x.title||x.name||'未知',vod_pic:fixImg(x.pic||x.img||''),vod_remarks:x.remark||x.label||'',vod_content:x.desc||x.content||''}}
function parseList(html){let d=new DOMParser().parseFromString(html,'text/html');let boxes=[...d.querySelectorAll('div.video-img-box')];return boxes.map(box=>{let a=box.querySelector('a[href*="/detail/"]'),m=a&&(a.getAttribute('href')||'').match(/\/detail\/(\d+)/);if(!m)return null;let title=clean(box.querySelector('h6.title,.title')&&box.querySelector('h6.title,.title').textContent||a.getAttribute('title')||'');let label=clean(box.querySelector('.label')&&box.querySelector('.label').textContent||'');let pic=box.querySelector('img')&&(box.querySelector('img').getAttribute('data-src')||box.querySelector('img').getAttribute('src'));return toVod({aid:m[1],title,pic,label})}).filter(x=>x&&x.vod_id&&x.vod_name)}
function parseWeekList(html,day){let d=new DOMParser().parseFromString(html,'text/html');let root=d.querySelector('#week-'+day)||d.querySelector('.week-content:not([style*="display:none"])')||d;let boxes=[...root.querySelectorAll('div.video-img-box')];return boxes.map(box=>{let a=box.querySelector('a[href*="/detail/"]'),m=a&&(a.getAttribute('href')||'').match(/\/detail\/(\d+)/);if(!m)return null;let title=clean(box.querySelector('h6.title,.title')&&box.querySelector('h6.title,.title').textContent||a.getAttribute('title')||'');let labels=[...box.querySelectorAll('.label')].map(x=>clean(x.textContent)).filter(Boolean);let time=labels.find(x=>/⏰|\d{1,2}:\d{2}/.test(x))||'';let remark=labels.find(x=>!/⏰|\d{1,2}:\d{2}/.test(x))||time;let pic=box.querySelector('img')&&(box.querySelector('img').getAttribute('data-src')||box.querySelector('img').getAttribute('src'));let v=toVod({aid:m[1],title,pic,label:remark});v.week_time=time;return v}).filter(x=>x&&x.vod_id&&x.vod_name)}
function renderTabs(){tabs.innerHTML=NAV.map(x=>`<button class="tab ${state.nav===x[0]?'active':''}" data-id="${x[0]}">${x[1]}</button>`).join('');tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.nav=b.dataset.id;state.page=1;load()})}
function renderChips(){if(state.nav==='cate'){chips.innerHTML=CATS.map(x=>`<button class="chip ${state.cat===x[0]?'active':''}" data-kind="cat" data-id="${x[0]}">${x[1]}</button>`).join('')+SORTS.map(x=>`<button class="chip ${state.sort===x[0]?'active':''}" data-kind="sort" data-id="${x[0]}">${x[1]}</button>`).join('');chips.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{if(b.dataset.kind==='cat')state.cat=b.dataset.id;else state.sort=b.dataset.id;state.page=1;load()})}else if(state.nav==='week'){chips.innerHTML=WEEKS.map(x=>`<button class="chip ${state.week===x[0]?'active':''}" data-id="${x[0]}">${x[1]}</button>`).join('');chips.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{state.week=b.dataset.id;state.page=1;load()})}else chips.innerHTML=''}
function cardHtml(v,i){return`<article class="card" data-i="${i}"><div class="poster">${v.vod_pic?`<img loading="lazy" referrerpolicy="no-referrer" src="${esc(v.vod_pic)}" onerror="this.style.display='none'">`:'<div class="noimg">漫</div>'}<span class="badge">${esc(v.vod_remarks||'动漫')}</span></div><div class="meta"><div class="name">${esc(v.vod_name)}</div><div class="remark">${esc(v.vod_remarks||'点击查看')}</div></div></article>`}
function bindCards(list){content.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(list[parseInt(c.dataset.i)]))}
function renderGrid(list,pager){state.last=list;if(!list.length){content.innerHTML='<div class="empty">暂无内容</div>';return}content.innerHTML=`<div class="grid">${list.map(cardHtml).join('')}</div>${pager?`<div class="pager"><button id="prev" ${state.page<=1?'disabled':''}>上一页</button><button id="next">下一页</button></div>`:''}`;bindCards(list);let p=$('#prev'),n=$('#next');if(p)p.onclick=()=>{if(state.page>1){state.page--;load()}};if(n)n.onclick=()=>{state.page++;load()}}
function renderSections(sections){content.innerHTML=sections.map(sec=>`<section class="section"><div class="section-title"><h2>${esc(sec.title)}</h2></div><div class="grid">${sec.list.map(cardHtml).join('')}</div></section>`).join('');let all=[];sections.forEach(s=>all=all.concat(s.list));state.last=all;content.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(all[parseInt(c.dataset.i)]))}
async function load(){renderTabs();renderChips();content.innerHTML='<div class="empty">加载中…</div>';try{if(state.nav==='home'){let a=parseList(await safeReq('/vod/show/by/time/id/ribendongman/page/1.html')).slice(0,6);let b=parseList(await safeReq('/vod/show/by/time/id/guochandongman/page/1.html')).slice(0,6);renderSections([{title:'日本最近更新',list:a},{title:'国产最近更新',list:b}]);status.textContent='主页加载完成'}else if(state.nav==='cate'){let list=parseList(await safeReq(`/vod/show/by/${state.sort}/id/${state.cat}/page/${state.page}.html`));renderGrid(list,true);status.textContent=`分类第 ${state.page} 页 · ${list.length} 条`}else{let html=await safeReq('/label/week.html');let list=parseWeekList(html,state.week);renderGrid(list,false);status.textContent=`${(WEEKS.find(x=>x[0]===state.week)||[])[1]||'周表'} · ${list.length} 条`}}catch(e){content.innerHTML='<div class="empty">加载失败：'+esc(e.message||e)+'</div>';status.textContent='加载失败'}}
async function search(q){q=clean(q);if(!q)return;content.innerHTML='<div class="empty">搜索中…</div>';try{let list=parseList(await safeReq('/vod/search/page/1/wd/'+encodeURIComponent(q)+'.html'));renderGrid(list,false);status.textContent=`搜索：${q} · ${list.length} 条`}catch(e){content.innerHTML='<div class="empty">搜索失败：'+esc(e.message||e)+'</div>'}}
function parseDetail(html,v){let d=new DOMParser().parseFromString(html,'text/html');let title=clean(d.querySelector('.page-title')&&d.querySelector('.page-title').textContent)||v.vod_name;let pic=(d.querySelector('.url_img')&&d.querySelector('.url_img').getAttribute('src'))||v.vod_pic;let info={director:'',actor:'',year:'',desc:''};[...d.querySelectorAll('.video-info-items')].forEach(row=>{let k=clean(row.querySelector('.video-info-itemtitle')&&row.querySelector('.video-info-itemtitle').textContent),c=clean(row.querySelector('.video-info-item')&&row.querySelector('.video-info-item').textContent);if(k.includes('导演'))info.director=c;if(k.includes('声优'))info.actor=c;if(k.includes('上映'))info.year=c;if(k.includes('剧情'))info.desc=c});let tabNames=[...d.querySelectorAll('.module-tab-item')].map((x,i)=>clean(x.querySelector('span')&&x.querySelector('span').textContent)||('线路'+(i+1)));let lists=[...d.querySelectorAll('.module-player-list')];let lines=lists.map((box,i)=>({name:tabNames[i]||('线路'+(i+1)),eps:[...box.querySelectorAll('.scroll-content a[href*="/play/"]')].map(a=>({name:clean(a.querySelector('span')&&a.querySelector('span').textContent)||clean(a.textContent)||'播放',href:a.getAttribute('href')}))})).filter(x=>x.eps.length);return{vod:Object.assign({},v,{vod_name:title,vod_pic:fixImg(pic),vod_content:info.desc}),info,lines}}
async function openDetail(v){$('#sheet').classList.add('active');$('#panel').innerHTML='<div class="empty">读取详情…</div>';try{currentDetail=parseDetail(await safeReq('/detail/'+v.vod_id+'.html'),v);let d=currentDetail;$('#panel').innerHTML=`<button class="btn" id="closeBtn">返回</button><div class="head"><img class="pic" referrerpolicy="no-referrer" src="${esc(d.vod.vod_pic)}" onerror="this.style.display='none'"><div><div class="title">${esc(d.vod.vod_name)}</div><div class="info"><div><b>导演：</b>${esc(d.info.director)}</div><div><b>声优：</b>${esc(d.info.actor)}</div><div><b>上映：</b>${esc(d.info.year)}</div></div></div></div><div class="pill">简介</div><div class="desc">${esc(d.info.desc||'暂无简介')}</div><div class="pill">播放线路</div><div class="line-tabs" id="lineTabs">${d.lines.map((x,i)=>`<button class="line-tab ${i===0?'active':''}" data-line="${esc(x.name)}">${esc(x.name)} (${x.eps.length})</button>`).join('')}</div><div class="eps" id="eps"></div>`;$('#closeBtn').onclick=closeDetail;$('#lineTabs').querySelectorAll('.line-tab').forEach(b=>b.onclick=()=>{$('#lineTabs').querySelectorAll('.line-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderEpisodes(b.dataset.line)});renderEpisodes(d.lines[0]&&d.lines[0].name)}catch(e){$('#panel').innerHTML='<button class="btn" onclick="window.__lmmClose()">返回</button><div class="empty">详情失败：'+esc(e.message||e)+'</div>'}}
function renderEpisodes(line){let ln=(currentDetail.lines||[]).find(x=>x.name===line)||currentDetail.lines[0],box=$('#eps');if(!ln){box.innerHTML='<div class="empty">暂无分集</div>';return}box.innerHTML=ln.eps.map((e,i)=>`<button class="ep" data-line="${esc(ln.name)}" data-i="${i}">${esc(e.name)}</button>`).join('');box.querySelectorAll('.ep').forEach(b=>b.onclick=()=>playEpisodeFull(b.dataset.line,parseInt(b.dataset.i),b.textContent))}
function playUrl(href){return 'video://'+abs(href)}
async function playEpisodeFull(line,index,mark){let d=currentDetail;if(!d)return;let ln=d.lines.find(x=>x.name===line)||d.lines[0],ep=ln.eps[index];if(!ep)return;let from=d.lines.map(x=>x.name).join('$$$');let urls=d.lines.map(x=>x.eps.map(e=>e.name+'$'+playUrl(e.href)).join('#')).join('$$$');let native=ln.eps.map(e=>({name:e.name,url:playUrl(e.href)}));let cur=playUrl(ep.href);if(window.fm&&typeof fm.vodInline==='function'){await fm.vodInline({vod_id:d.vod.vod_id,vod_name:d.vod.vod_name,vod_pic:d.vod.vod_pic,vod_remarks:d.vod.vod_remarks,vod_content:d.vod.vod_content,vod_play_from:from,vod_play_url:urls,play_from:line,mark:mark||ep.name,episodes:native,url:cur});return}if(window.fm&&fm.play){await fm.play(cur,d.vod.vod_name+' '+(mark||ep.name));return}location.href=cur}
function closeDetail(){$('#sheet').classList.remove('active')}
$('#searchForm').onsubmit=e=>{e.preventDefault();search($('#kw').value)};
window.__lmmClose=closeDetail;
load();
})();
</script>
</body>
</html>
