  <style>
    :root {
      color-scheme: dark;
      --panel-rgb: 70, 79, 88;
      --panel: rgba(var(--panel-rgb), .64);
      --panel-soft: rgba(var(--panel-rgb), .48);
      --panel-strong: rgba(32, 38, 45, .9);
      --line: rgba(255, 255, 255, .18);
      --line-strong: rgba(255, 255, 255, .36);
      --text: #f5f7fb;
      --muted: rgba(226, 233, 240, .72);
      --faint: rgba(226, 233, 240, .5);
      --accent: #f0d18b;
      --accent-2: #79c7c1;
      --danger: #ff8e8e;
      --ok: #8ee6b3;
      --safe-top: var(--fm-safe-top, 0px);
      --safe-right: var(--fm-safe-right, 0px);
      --safe-bottom: var(--fm-safe-bottom, 0px);
      --safe-left: var(--fm-safe-left, 0px);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @supports (top: max(0px, env(safe-area-inset-top))) {
      :root {
        --safe-top: max(var(--fm-safe-top, 0px), env(safe-area-inset-top, 0px));
        --safe-right: max(var(--fm-safe-right, 0px), env(safe-area-inset-right, 0px));
        --safe-bottom: max(var(--fm-safe-bottom, 0px), env(safe-area-inset-bottom, 0px));
        --safe-left: max(var(--fm-safe-left, 0px), env(safe-area-inset-left, 0px));
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: transparent;
      color: var(--text);
    }

    html:not(.fm-native),
    html:not(.fm-native) body {
      background: #171d23;
    }

    body {
      min-height: var(--fm-web-height, 100vh);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .app {
      min-height: var(--fm-web-height, 100vh);
      background: transparent;
      padding: calc(var(--safe-top) + 18px) calc(var(--safe-right) + 18px) calc(var(--safe-bottom) + 28px) calc(var(--safe-left) + 18px);
    }

    html:not(.fm-native) .app:before {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      background: linear-gradient(135deg, #20272e 0%, #151a20 48%, #262820 100%);
      z-index: -1;
    }

    body.detail-active .app {
      visibility: hidden;
      pointer-events: none;
    }

    .shell {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
    }

    .topbar {
      display: block;
      margin-bottom: 18px;
    }

    .brand-row,
    .toolbar,
    .section-head,
    .pager,
    .detail-actions,
    .magnet-actions,
    .samples {
      display: flex;
    }

    .brand-row {
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .brand {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0;
    }

    .searchbar {
      display: flex;
      align-items: stretch;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .searchbar input {
      flex: 1 1 auto;
      min-width: 0;
      border: 0;
      outline: 0;
      padding: 0 14px;
      color: var(--text);
      background: transparent;
    }

    .searchbar input::placeholder {
      color: var(--faint);
    }

    .icon-button,
    .text-button,
    .chip {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 8px;
      min-height: 42px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-button {
      width: 46px;
      min-width: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .text-button {
      padding: 0 14px;
      font-weight: 700;
    }

    .text-button[disabled] {
      opacity: .62;
      cursor: default;
    }

    .searchbar .text-button,
    .searchbar .icon-button {
      border-top: 0;
      border-bottom: 0;
      border-right: 0;
      border-radius: 0;
      background: rgba(255, 255, 255, .07);
    }

    .toolbar {
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
    }

    .chip {
      margin: 0 8px 8px 0;
      padding: 0 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .chip.active {
      color: #171717;
      background: var(--accent);
      border-color: rgba(255, 255, 255, .44);
    }

    .section {
      margin-top: 22px;
    }

    .section-head {
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.25;
    }

    .status-text {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      margin: -8px;
    }

    .card {
      width: 50%;
      padding: 8px;
    }

    @supports (display: grid) {
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-gap: 16px;
        margin: 0;
      }

      .card {
        width: auto;
        padding: 0;
      }
    }

    @media (min-width: 720px) {
      @supports (display: grid) {
        .grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) minmax(360px, 1.4fr);
        grid-column-gap: 18px;
        align-items: end;
      }

      .brand-row {
        margin-bottom: 0;
      }
    }

    @media (min-width: 1040px) {
      @supports (display: grid) {
        .grid {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }
      }
    }

    @media (min-width: 1360px) {
      @supports (display: grid) {
        .grid {
          grid-template-columns: repeat(7, minmax(0, 1fr));
        }
      }
    }

    .movie-card {
      display: block;
      height: 100%;
      color: inherit;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      overflow: hidden;
      transform: translateY(0);
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      contain: layout style;
    }

    .movie-card:focus,
    .movie-card.focused,
    .chip:focus,
    .icon-button:focus,
    .text-button:focus,
    .magnet-row:focus,
    .sample-button:focus {
      outline: 2px solid rgba(255, 255, 255, .82);
      outline-offset: 2px;
      border-color: var(--line-strong);
    }

    .movie-card:focus,
    .movie-card.focused {
      transform: translateY(-2px) scale(1.015);
      background: rgba(78, 88, 98, .66);
    }

    .poster {
      position: relative;
      width: 100%;
      background: rgba(255, 255, 255, .08);
      overflow: hidden;
    }

    .poster:before {
      content: "";
      display: block;
      padding-top: 142%;
    }

    .poster img {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: .98;
    }

    .badge-row {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      display: flex;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      margin: 0 5px 5px 0;
      padding: 0 7px;
      border-radius: 7px;
      background: rgba(0, 0, 0, .68);
      color: #fff;
      font-size: 11px;
      line-height: 1;
    }

    .badge.ok {
      color: #0e2719;
      background: var(--ok);
    }

    .card-body {
      min-height: 112px;
      padding: 10px;
    }

    .code {
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
      line-height: 1.25;
    }

    .title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: 5px;
      font-size: 13px;
      line-height: 1.35;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .pager {
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }

    .pager .text-button {
      margin: 0 6px;
    }

    .page-label {
      min-width: 56px;
      text-align: center;
      color: var(--muted);
    }

    .empty,
    .error {
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    .error {
      color: var(--danger);
    }

    .sheet {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 60;
      background: rgba(12, 15, 18, .86);
      color: var(--text);
      overflow: auto;
      padding: calc(var(--safe-top) + 18px) calc(var(--safe-right) + 18px) calc(var(--safe-bottom) + 28px) calc(var(--safe-left) + 18px);
    }

    .sheet[hidden] {
      display: none;
    }

    .detail-shell {
      max-width: 1360px;
      margin: 0 auto;
    }

    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .detail-layout {
      display: block;
    }

    @media (min-width: 920px) {
      .detail-layout {
        display: grid;
        grid-template-columns: minmax(320px, 44%) minmax(0, 1fr);
        grid-column-gap: 22px;
        align-items: start;
      }
    }

    .detail-poster {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      overflow: hidden;
    }

    .detail-info {
      margin-top: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    @media (min-width: 920px) {
      .detail-info {
        margin-top: 0;
      }
    }

    .detail-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .detail-meta {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .tag-list {
      margin-top: 12px;
    }

    .tag-list .badge {
      position: static;
      background: rgba(255, 255, 255, .09);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .detail-actions {
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .detail-actions .text-button {
      margin: 0 8px 8px 0;
    }

    .detail-block {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .detail-block h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .samples {
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .sample-button {
      position: relative;
      width: 132px;
      min-width: 132px;
      margin-right: 10px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .08);
      overflow: hidden;
      cursor: pointer;
    }

    .sample-button:before {
      content: "";
      display: block;
      padding-top: 64%;
    }

    .sample-button img {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .magnet-row {
      display: block;
      width: 100%;
      text-align: left;
      margin-top: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .07);
      cursor: pointer;
    }

    .magnet-title {
      font-weight: 700;
      line-height: 1.35;
    }

    .magnet-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .loading-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 8px;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { opacity: .35; }
      50% { opacity: 1; }
      100% { opacity: .35; }
    }

    html.no-layout-gap .toolbar .chip,
    html.no-layout-gap .detail-actions .text-button {
      margin-right: 8px;
      margin-bottom: 8px;
    }

    html.no-css-functions .app,
    html.no-css-functions .sheet {
      padding: 24px;
    }

    @media (min-width: 1100px) {
      html.tv-mode .brand-title {
        font-size: 34px;
      }

      html.tv-mode .section h2 {
        font-size: 28px;
      }

      html.tv-mode .card-body,
      html.tv-mode .meta,
      html.tv-mode .chip,
      html.tv-mode .text-button {
        font-size: 18px;
      }

      html.tv-mode .title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="shell">
      <header class="topbar">
        <div class="brand-row">
          <div class="brand">
            <h1 class="brand-title">catemby遗产</h1>
          </div>
        </div>
        <form class="searchbar" id="searchForm">
          <input id="searchInput" class="focusable" type="search" placeholder="番号、演员名、关键词" autocomplete="off">
          <button class="text-button focusable" type="submit">搜索</button>
          <button class="icon-button focusable" id="nativeSearchBtn" type="button" title="原生搜索" aria-label="原生搜索">
            <span aria-hidden="true">↗</span>
          </button>
        </form>
      </header>

      <div class="toolbar" id="modeTabs" role="tablist" aria-label="内容分类"></div>
      <div class="toolbar" id="filterTabs" role="tablist" aria-label="筛选"></div>

      <section class="section">
        <div class="section-head">
          <h2 id="listTitle">热播</h2>
          <div class="status-text" id="statusText">准备加载</div>
        </div>

          });
        } else if (state.mode === "recommend") {
          promise = apiRequest("/v1/movies/recommend", {});
        } else if (state.mode === "latest") {
          promise = apiRequest("/v1/movies/latest", {
            page: state.page,
            filter_by: state.filter
          });
        } else {
          promise = apiRequest("/v1/movies/tags", {
            filter_by: categoryFilter(state.mode),
            sort_by: "release",
            order_by: "desc",
            page: state.page,
            limit: 24
          });
        }
        promise.then(function (data) {
          if (reqId !== state.requestId) return;
          var raw = data.movies || [];
          state.movies = raw.map(displayMovie);
          setLoading(false, state.movies.length + " 条");
          renderGrid();
          focusAfterRender();
        }).catch(function (err) {
          if (reqId !== state.requestId) return;
          state.error = err && err.message ? err.message : "加载失败";
          state.lastApiError = state.error;
          setLoading(false, "加载失败");
          renderGrid();
        });
      }

      function categoryFilter(mode) {
        var type = CATEGORY_TYPE[mode] || "0";
        return type + ":t:::::";
      }

      function focusAfterRender() {
        requestAnimationFrame(function () {
          var target = document.querySelector(".movie-card.focusable") || document.querySelector(".chip.focusable");
          if (target && !state.isTv) return;
          if (target) focusTarget(target);
        });
      }

      function openDetail(id, pushHistory) {
        if (!id) return;
        lastFocus = document.activeElement;
        state.detailId = id;
        els.detailSheet.hidden = false;
        document.body.classList.add("detail-active");
        els.detailStatus.textContent = "加载详情";
        els.detailContent.innerHTML = '<div class="empty"><span><span class="loading-dot"></span>加载中</span></div>';
        if (pushHistory) history.pushState({ panel: "detail", id: id }, "", "#movie-" + encodeURIComponent(id));
        Promise.all([
          apiRequest("/v4/movies/" + encodeURIComponent(id), {}),
          apiRequest("/v1/movies/" + encodeURIComponent(id) + "/magnets", {})
        ]).then(function (items) {
          if (state.detailId !== id) return;
          var movie = displayMovie(items[0].movie || {});
          state.detailMovie = movie;
          state.detailMagnets = items[1].magnets || [];
          renderDetail(movie, state.detailMagnets);
        }).catch(function (err) {
          els.detailStatus.textContent = "详情失败";
          els.detailContent.innerHTML = '<div class="error">' + escapeHtml(err && err.message ? err.message : "详情加载失败") + '</div>';
        });
      }

      function renderDetail(movie, magnets) {
        var poster = movie.cover || movie.thumb;
        var tagHtml = [];
        var i;
        for (i = 0; i < movie.tags.length && i < 12; i++) {
          tagHtml.push('<span class="badge">' + escapeHtml(movie.tags[i].name || movie.tags[i]) + '</span>');
        }
        var actorNames = [];
        for (i = 0; i < movie.actors.length && i < 8; i++) {
          actorNames.push(movie.actors[i].name || "");
        }
        var samples = movie.previewImages || [];
        var sampleHtml = samples.slice(0, 10).map(function (item, index) {
          var url = item.thumb_url || item.large_url || "";
          return '<button class="sample-button focusable" type="button" data-sample="' + escapeHtml(item.large_url || url) + '" aria-label="样图 ' + (index + 1) + '"><img src="' + CONFIG.emptyGif + '" data-encoded-src="' + escapeHtml(url) + '" alt=""></button>';
        }).join("");
        var magnetHtml = magnets && magnets.length ? magnets.map(function (item, index) {
          var hash = item.hash || "";
          var size = item.size ? item.size + " MB" : "-";
          var flags = [];
          if (item.hd) flags.push("HD");
          if (item.cnsub) flags.push("中字");
          if (item.files_count) flags.push(item.files_count + " 文件");
          return '<button class="magnet-row focusable" type="button" data-magnet-index="' + index + '">' +
            '<div class="magnet-title">' + escapeHtml(item.name || hash) + '</div>' +
            '<div class="magnet-meta">' + escapeHtml(size + " · " + (item.created_at || "-") + (flags.length ? " · " + flags.join(" · ") : "")) + '</div>' +
            '</button>';
        }).join("") : '<div class="empty">暂无磁链</div>';
        els.detailStatus.textContent = movie.number || "详情";
        els.detailContent.innerHTML = [
          '<div class="detail-layout">',
          '<div class="detail-poster poster"><img src="' + CONFIG.emptyGif + '" data-encoded-src="' + escapeHtml(poster) + '" alt="' + escapeHtml(compactTitle(movie)) + '"></div>',
          '<div class="detail-info">',
          '<h2 class="detail-title"><span class="code">' + escapeHtml(movie.number) + '</span> ' + escapeHtml(movie.title) + '</h2>',
          '<p class="detail-meta">' + escapeHtml(movie.releaseDate || "-") + ' · ' + escapeHtml(movie.duration || "-") + (movie.score ? ' · ' + movie.score.toFixed(2) + ' 分' : '') + (movie.watchedCount ? ' · ' + movie.watchedCount + ' 看过' : '') + '</p>',
          '<p class="detail-meta">' + escapeHtml([movie.makerName, movie.directorName, movie.seriesName].filter(Boolean).join(" · ")) + '</p>',
          actorNames.length ? '<p class="detail-meta">' + escapeHtml(actorNames.join(" · ")) + '</p>' : '',
          '<div class="tag-list">' + tagHtml.join("") + '</div>',
          '<div class="detail-actions">',
          movie.number ? '<button class="text-button focusable" type="button" id="detailFullVideo">完整视频</button>' : '',
          movie.previewVideoUrl ? '<button class="text-button focusable" type="button" id="detailPreview">播放预告</button>' : '',
          magnets && magnets.length ? '<button class="text-button focusable" type="button" id="detailFirstMagnet">播放磁链</button>' : '',
          '<button class="text-button focusable" type="button" id="detailNativeSearch">原生搜索</button>',
          '</div>',
          movie.summary ? '<div class="detail-block"><h3>简介</h3><div class="detail-meta">' + escapeHtml(movie.summary) + '</div></div>' : '',
          '<div class="detail-block"><h3>样图</h3><div class="samples">' + (sampleHtml || '<div class="empty">暂无样图</div>') + '</div></div>',
          '<div class="detail-block"><h3>磁链</h3><div id="magnetList">' + magnetHtml + '</div></div>',
          '</div>',
          '</div>'
        ].join("");
        decodeImages(els.detailContent);
        bindDetailActions();
        requestAnimationFrame(function () {
          var first = els.detailContent.querySelector(".focusable") || els.closeDetailBtn;
          if (state.isTv && first) focusTarget(first);
        });
      }

      function bindDetailActions() {
        var nativeBtn = $("detailNativeSearch");
        var fullBtn = $("detailFullVideo");
        var previewBtn = $("detailPreview");
        var magnetBtn = $("detailFirstMagnet");
        if (nativeBtn) nativeBtn.addEventListener("click", function () { nativeSearch(compactTitle(state.detailMovie)); });
        if (fullBtn) fullBtn.addEventListener("click", function () { playFullVideo(state.detailMovie); });
        if (previewBtn) previewBtn.addEventListener("click", function () { playPreview(state.detailMovie); });
        if (magnetBtn) magnetBtn.addEventListener("click", function () { playMagnet(state.detailMagnets[0], state.detailMovie); });
        var rows = els.detailContent.querySelectorAll("[data-magnet-index]");
        Array.prototype.forEach.call(rows, function (row) {
          row.addEventListener("click", function () {
            var index = Number(row.getAttribute("data-magnet-index"));
            playMagnet(state.detailMagnets[index], state.detailMovie);
          });
        });
        var samples = els.detailContent.querySelectorAll("[data-sample]");
        Array.prototype.forEach.call(samples, function (button) {
          button.addEventListener("click", function () {
            var url = button.getAttribute("data-sample");
            if (url) window.open(url, "_blank");
          });
        });
      }

      function closeDetail(fromPop) {
        state.detailId = "";
        state.detailMovie = null;
        state.detailMagnets = [];
        els.detailSheet.hidden = true;
        document.body.classList.remove("detail-active");
        if (!fromPop && location.hash.indexOf("#movie-") === 0) history.back();
        if (lastFocus && lastFocus.focus) requestAnimationFrame(function () { focusTarget(lastFocus); });
      }

      function playPreview(movie) {
        if (!movie || !movie.previewVideoUrl) return;
        var fm = nativeSdk();
        var title = compactTitle(movie);
        if (fm && fm.play) {
          fm.play(movie.previewVideoUrl, title, { headers: { Referer: CONFIG.sourceOrigin } }).catch(function () {});
          return;
        }
        window.open(movie.previewVideoUrl, "_blank");
      }

      function fullVideoUrl(movie) {
        var code = movie && movie.number ? movie.number : "";
        var base = CONFIG.sourceBase.replace(/\/$/, "");
        return base + "/api/v/resolve?code=" + encodeURIComponent(code) + "&lang=zh";
      }

      function variantUrl(item) {
        return item && (item.sourceUrl || item.source_url || item.playUrl || item.url) ? (item.sourceUrl || item.source_url || item.playUrl || item.url) : "";
      }

      function isHttpUrl(url) {
        return /^https?:\/\//i.test(url || "");
      }

      function isDataPlaylist(url) {
        return /^data:application\/vnd\.apple\.mpegurl/i.test(url || "");
      }

      function fullVideoVariants(body) {
        var variants = [];
        if (body && body.variants) variants = body.variants;
        else if (body && body.data && body.data.variants) variants = body.data.variants;
        else if (body && body.result && body.result.variants) variants = body.result.variants;
        return Array.isArray(variants) ? variants : [];
      }

      function scoreVariant(item) {
        var url = variantUrl(item);
        var type = text(item && item.sourceType).toLowerCase();
        var variant = text(item && item.variant).toLowerCase();
        var quality = text(item && item.quality).toLowerCase();
        var score = 0;
        if (isHttpUrl(url)) score += 60;
        if (isDataPlaylist(url)) score += 20;
        if (variant === "original") score += 50;
        else if (variant.indexOf("original") >= 0) score += 38;
        else if (variant.indexOf("reducing_mosaic") >= 0) score += 25;
        if (type.indexOf("mp4") >= 0 || /\.mp4(\?|$)/i.test(url)) score += 12;
        if (quality.indexOf("1080") >= 0) score += 8;
        else if (quality.indexOf("720") >= 0 || quality.indexOf("hd") >= 0) score += 5;
        return score;
      }

      function pickFullVideoVariant(variants) {
        var best = null;
        var bestScore = -1;
        for (var i = 0; i < variants.length; i++) {
          var item = variants[i] || {};
          var url = variantUrl(item);
          if (!isHttpUrl(url) && !isDataPlaylist(url)) continue;
          var score = scoreVariant(item);
          if (!best || score > bestScore) {
            best = item;
            bestScore = score;
          }
        }
        return best;
      }

      function resolveFullVideo(movie) {
        if (!movie || !movie.number) return Promise.reject(new Error("缺少番号"));
        return siteJsonRequest(fullVideoUrl(movie)).then(function (body) {
          var variants = fullVideoVariants(body);
          var selected = pickFullVideoVariant(variants);
          if (!selected) throw new Error("未找到完整视频源");
          return selected;
        });
      }

      function restoreFullButton(button, label) {
        if (!button) return;
        button.disabled = false;
        button.removeAttribute("aria-busy");
        button.textContent = label;
        if (state.isTv) focusTarget(button);
      }

      function playFullVideo(movie) {
        var button = $("detailFullVideo");
        var oldText = button ? button.textContent : "完整视频";
        if (button) {
          button.disabled = true;
          button.setAttribute("aria-busy", "true");
          button.textContent = "解析中";
        }
        els.detailStatus.textContent = "解析完整视频";
        resolveFullVideo(movie).then(function (variant) {
          var url = variantUrl(variant);
          var label = variant && variant.label ? " · " + variant.label : "";
          var title = variant && variant.title ? variant.title : compactTitle(movie) + label;
          var headers = { Referer: variant && variant.pageUrl ? variant.pageUrl : CONFIG.sourceOrigin };
          var fm = nativeSdk();
          els.detailStatus.textContent = "打开完整视频";
          restoreFullButton(button, oldText);
          if (fm && fm.play) {
            fm.play(url, title, { headers: headers }).catch(function () {
              els.detailStatus.textContent = "播放失败";
            });
            return;
          }
          window.open(url, "_blank");
        }).catch(function (err) {
          restoreFullButton(button, oldText);
          els.detailStatus.textContent = err && err.message ? err.message : "完整视频解析失败";
        });
      }

      function playMagnet(item, movie) {
        if (!item) return;
        var hash = item.hash || "";
        var url = hash.indexOf("magnet:") === 0 ? hash : "magnet:?xt=urn:btih:" + hash;
        var title = movie ? compactTitle(movie) : (item.name || url);
        var fm = nativeSdk();
        if (fm && fm.pan && fm.pan.play) {
          fm.pan.play({ type: "magnet", url: url, title: title }).catch(function () {});
          return;
        }
        location.href = url;
      }

      function nativeSearch(keyword) {
        keyword = text(keyword || els.searchInput.value).trim();
        if (!keyword) return;
        var fm = nativeSdk();
        if (fm && fm.search) {
          fm.search(keyword, { direct: true }).catch(function () {});
          return;
        }
        state.currentQuery = keyword;
        state.page = 1;
        loadList();
      }

      function applyDeviceMode() {
        var client = window.fongmiClient || {};
        var isTv = !!client.isLeanback || client.mode === "leanback" || client.mode === "tv";
        if (!isTv && window.matchMedia) {
          try {
            isTv = window.innerWidth >= 960 && window.matchMedia("(pointer: coarse)").matches;
          } catch (e) {}
        }
        state.isTv = !!isTv;
        document.documentElement.classList.toggle("tv-mode", state.isTv);
        document.documentElement.classList.toggle("mobile-mode", !state.isTv);
        if (state.isTv) els.searchInput.setAttribute("readonly", "readonly");
        else els.searchInput.removeAttribute("readonly");
      }

      function searchSubmit(event) {
        if (event) event.preventDefault();
        var value = text(els.searchInput.value).trim();
        state.currentQuery = value;
        state.page = 1;
        loadList();
      }

      function handleClick(event) {
        var mode = event.target.closest ? event.target.closest("[data-mode]") : null;
        var filter = event.target.closest ? event.target.closest("[data-filter]") : null;
        var card = event.target.closest ? event.target.closest(".movie-card[data-id]") : null;
        if (mode) {
          state.mode = mode.getAttribute("data-mode");
          state.currentQuery = "";
          state.page = 1;
          loadList();
          return;
        }
        if (filter) {
          state.filter = filter.getAttribute("data-filter");
          state.currentQuery = "";
          state.page = 1;
          loadList();
          return;
        }
        if (card) {
          event.preventDefault();
          openDetail(card.getAttribute("data-id"), true);
        }
      }

      function focusables(scope) {
        var root = scope || document;
        var list = root.querySelectorAll(".focusable, button, input, a[href]");
        return Array.prototype.filter.call(list, function (el) {
          return isFocusable(el);
        });
      }

      function isFocusable(el) {
        if (!el || el.disabled) return false;
        if (el.getAttribute("tabindex") === "-1") return false;
        var hiddenParent = el.closest && el.closest("[hidden]");
        if (hiddenParent) return false;
        var rects = el.getClientRects ? el.getClientRects() : [];
        return !!rects.length;
      }

      function focusTarget(el) {
        if (!el || !el.focus) return;
        try {
          el.focus({ preventScroll: true });
        } catch (e) {
          el.focus();
        }
        requestAnimationFrame(function () {
          try {
            el.scrollIntoView({ block: "nearest", inline: "nearest" });
          } catch (e) {
            el.scrollIntoView(false);
          }
        });
      }

      function moveFocus(key) {
        var active = document.activeElement;
        var panel = !els.detailSheet.hidden ? els.detailSheet : document;
        var items = focusables(panel);
        if (!items.length) return;
        if (!active || items.indexOf(active) === -1) {
          focusTarget(items[0]);
          return;
        }
        var rect = active.getBoundingClientRect();
        var best = null;
        var bestScore = Infinity;
        items.forEach(function (candidate) {
          if (candidate === active) return;
          var next = candidate.getBoundingClientRect();
          var dx = next.left + next.width / 2 - (rect.left + rect.width / 2);
          var dy = next.top + next.height / 2 - (rect.top + rect.height / 2);
          if (key === "ArrowLeft" && dx >= -2) return;
          if (key === "ArrowRight" && dx <= 2) return;
          if (key === "ArrowUp" && dy >= -2) return;
          if (key === "ArrowDown" && dy <= 2) return;
          var primary = key === "ArrowLeft" || key === "ArrowRight" ? Math.abs(dx) : Math.abs(dy);
          var secondary = key === "ArrowLeft" || key === "ArrowRight" ? Math.abs(dy) : Math.abs(dx);
          var score = primary * 1.2 + secondary;
          if (score < bestScore) {
            bestScore = score;
            best = candidate;
          }
        });
        if (best) focusTarget(best);
      }

      function normalizeRemoteKey(event) {
        var key = event.key || "";
        var code = event.keyCode || 0;
        if (code === 37 || code === 21) return "ArrowLeft";
        if (code === 38 || code === 19) return "ArrowUp";
        if (code === 39 || code === 22) return "ArrowRight";
        if (code === 40 || code === 20) return "ArrowDown";
        if (code === 13 || code === 23 || code === 66) return "Enter";
        if (code === 27 || code === 4 || code === 111 || code === 461) return "Escape";
        if (key === "Esc" || key === "Back" || key === "GoBack" || key === "BrowserBack") return "Escape";
        if (key === "OK" || key === "Select") return "Enter";
        return key;
      }

      function activateFocused(event) {
        var active = document.activeElement;
        if (!active || !isFocusable(active)) return false;
        if (active === els.searchInput) return false;
        if (typeof active.click === "function") {
          event.preventDefault();
          active.click();
          return true;
        }
        return false;
      }

      function handleKeydown(event) {
        var key = normalizeRemoteKey(event);
        var active = document.activeElement;
        if (state.isTv && active === els.searchInput && !els.searchInput.hasAttribute("readonly") && key === "Escape") {
          event.preventDefault();
          els.searchInput.setAttribute("readonly", "readonly");
          els.searchInput.focus();
          return;
        }
        if (key === "Escape" || key === "Backspace" && state.isTv) {
          if (!els.detailSheet.hidden) {
            event.preventDefault();
            closeDetail(false);
            return;
          }
        }
        if (key === "Enter" && document.activeElement === els.searchInput && state.isTv && els.searchInput.hasAttribute("readonly")) {
          event.preventDefault();
          els.searchInput.removeAttribute("readonly");
          els.searchInput.focus();
          return;
        }
        if (key === "Enter" && state.isTv && activateFocused(event)) return;
        if (state.isTv && active === els.searchInput && !els.searchInput.hasAttribute("readonly")) return;
        if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].indexOf(key) >= 0 && state.isTv) {
          event.preventDefault();
          moveFocus(key);
        }
      }

      function initEvents() {
        document.addEventListener("click", handleClick);
        document.addEventListener("keydown", handleKeydown);
        window.addEventListener("resize", applyDeviceMode);
        window.addEventListener("fmviewport", applyDeviceMode);
        window.addEventListener("popstate", function () {
          if (!els.detailSheet.hidden) closeDetail(true);
        });
        els.searchForm.addEventListener("submit", searchSubmit);
        els.nativeSearchBtn.addEventListener("click", function () { nativeSearch(els.searchInput.value); });
        els.prevBtn.addEventListener("click", function () {
          if (state.page > 1) {
            state.page -= 1;
            loadList();
          }
        });
        els.nextBtn.addEventListener("click", function () {
          state.page += 1;
          loadList();
        });
        els.closeDetailBtn.addEventListener("click", function () { closeDetail(false); });
        els.searchInput.addEventListener("blur", function () {
          if (state.isTv) els.searchInput.setAttribute("readonly", "readonly");
        });
      }

      function setChrome() {
        var fm = nativeSdk();
        if (fm && fm.ui && fm.ui.setChrome) {
          fm.ui.setChrome({
            mode: "edge",
            statusBarStyle: "light",
            navigationBarStyle: "light",
            restoreAffordance: "auto",
            startup: true
          }).catch(function () {});
        }
      }

      function init() {
        els.app = $("app");
        els.searchForm = $("searchForm");
        els.searchInput = $("searchInput");
        els.nativeSearchBtn = $("nativeSearchBtn");
        els.modeTabs = $("modeTabs");
        els.filterTabs = $("filterTabs");
        els.listTitle = $("listTitle");
        els.statusText = $("statusText");
        els.grid = $("grid");
        els.pager = $("pager");
        els.pageLabel = $("pageLabel");
        els.prevBtn = $("prevBtn");
        els.nextBtn = $("nextBtn");
        els.detailSheet = $("detailSheet");
        els.detailStatus = $("detailStatus");
        els.detailContent = $("detailContent");
        els.closeDetailBtn = $("closeDetailBtn");
        initEvents();
        renderTabs();
        waitForNativeSdk(1800).then(function (ready) {
          state.sdkReady = ready;
          state.isNative = !!nativeSdk();
          if (state.isNative) document.documentElement.classList.add("fm-native");
          applyDeviceMode();
          setChrome();
          loadList();
        });
      }

      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
      else init();
    })();
  </script>
</body>
</html>
